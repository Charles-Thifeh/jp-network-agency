<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Admin Login – JP Networking</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Inter+Tight:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter Tight',sans-serif;background:linear-gradient(135deg,#060E22 0%,#0A1F44 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
    .card{background:#fff;border-radius:1.5rem;padding:2.5rem;width:100%;max-width:420px;box-shadow:0 24px 64px rgba(0,0,0,0.35)}
    .logo{display:flex;align-items:center;gap:.75rem;margin-bottom:2rem;justify-content:center}
    .logo-icon{width:48px;height:48px;border-radius:.875rem;background:#3B8FD4;display:flex;align-items:center;justify-content:center}
    .logo-icon svg{width:28px;height:28px;color:#fff}
    .logo-text{font-family:'Poppins',sans-serif;font-weight:700;color:#0A1F44;font-size:1rem;line-height:1.3}
    .logo-sub{font-size:.75rem;color:#6b7280;font-weight:400}
    h1{font-family:'Poppins',sans-serif;font-weight:700;color:#0A1F44;font-size:1.4rem;margin-bottom:.35rem;text-align:center}
    .subtitle{color:#6b7280;font-size:.85rem;text-align:center;margin-bottom:1.75rem}
    label{display:block;font-size:.8rem;font-weight:600;color:#0A1F44;margin-bottom:.4rem}
    input{width:100%;border:1.5px solid #d0e8f7;border-radius:.625rem;padding:.7rem 1rem;font-family:'Inter Tight',sans-serif;font-size:.9rem;background:#f8fbfe;color:#1a1a2e;transition:border-color .2s,box-shadow .2s;margin-bottom:1.1rem}
    input:focus{outline:none;border-color:#3B8FD4;box-shadow:0 0 0 3px rgba(59,143,212,.12);background:#fff}
    .btn{width:100%;background:#3B8FD4;color:#fff;font-family:'Poppins',sans-serif;font-weight:600;padding:.8rem;border:none;border-radius:.625rem;font-size:.95rem;cursor:pointer;transition:background .2s,transform .15s}
    .btn:hover{background:#2a7abf;transform:translateY(-1px)}
    .error{background:#fef2f2;border:1px solid #fecaca;color:#b91c1c;border-radius:.625rem;padding:.7rem 1rem;font-size:.85rem;margin-bottom:1rem;text-align:center}
    .lock{text-align:center;margin-top:1.5rem;font-size:.75rem;color:#9ca3af}
    .lock svg{display:inline-block;vertical-align:middle;margin-right:.25rem}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
      </div>
      <div>
        <div class="logo-text">JP Networking Services</div>
        <div class="logo-sub">Admin Portal</div>
      </div>
    </div>

    <h1>Welcome Back</h1>
    <p class="subtitle">Sign in to manage bookings and messages</p>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST">
      <label>Username</label>
      <input type="text" name="username" placeholder="admin" autocomplete="username" required/>
      <label>Password</label>
      <input type="password" name="password" placeholder="••••••••" autocomplete="current-password" required/>
      <button class="btn" type="submit">Sign In</button>
    </form>

    <div class="lock">
      <svg width="12" height="12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
      Secure admin access only
    </div>
  </div>
</body>
</html>
